<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mijn GitHub Pages Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            color: #333;
            text-align: center;
        }

        header {
            background: #24292e;
            color: white;
            padding: 40px;
        }

        h1 {
            font-size: 45px;
        }

        main {
            padding: 40px;
        }

        .kaart {
            background: white;
            max-width: 600px;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px #aaa;
        }

        a.knop {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: #0078ff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        a.knop:hover {
            background: #005fcc;
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            background: #24292e;
            color: white;
        }
    </style>
</head>

<body>

<header>
    <h1>Welkom op mijn website 🚀</h1>
    <p>Deze pagina draait via GitHub Pages</p>
</header>


<main>

    <div class="kaart">

        <h2>Mijn eerste website</h2>

        <p>
            Dit is mijn eigen GitHub Pages site.
            Ik kan hier projecten, foto's of informatie plaatsen.
        </p>

        <a class="knop" href="https://github.com">
            Mijn GitHub
        </a>

    </div>

</main>


<footer>
    © 2026 Mijn Naam
</footer>


</body>
</html>
